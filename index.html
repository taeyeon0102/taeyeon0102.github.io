<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">

    <title>Taeyeon page</title> <style>
        /* CSS: 디자인 - 복잡하면 일단 건드리지 않으셔도 됩니다 */
        :root { --main-color: #FFC0CB; /* 포인트 컬러: pink */ }
        body { font-family: 'Pretendard', -apple-system, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 40px 20px; background-color: #FFE6EA; }
        
        /* 헤더: 사진(왼쪽) + 정보(오른쪽) */
        header { display: flex; align-items: center; gap: 40px; border-bottom: 2px solid #eee; padding-bottom: 40px; margin-bottom: 40px; }
        .profile-img { width: 300px; height: 300px; border-radius: 5%; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .bio h1 { margin: 0 0 10px 0; font-size: 2.5rem; color: var(--main-color); }
        .bio p { margin: 5px 0; color: #666; font-size: 1.1rem; }
        .contact-links { margin-top: 15px; }
        .contact-links a { text-decoration: none; color: ##FFE6EA; background-color: var(--main-color); padding: 5px 12px; border-radius: 20px; font-size: 0.9rem; margin-right: 5px; }
        .contact-links a:hover { opacity: 0.8; }

        /* 메인: 목록형 세션 */
        section { margin-bottom: 40px; }
        h2 { font-size: 1.8rem; border-left: 5px solid var(--main-color); padding-left: 15px; margin-bottom: 20px; }
        .list-item { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.2s; display: block; text-decoration: none; color: #333; }
        
        /* 중요: 클릭 가능한 목록 효과 */
        .list-item:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .item-title { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; color: #000; }
        .item-date { color: var(--main-color); font-size: 0.9rem; font-weight: bold; }
        .item-desc { color: #666; margin-top: 5px; font-size: 0.95rem; }

        /* 반응형: 화면이 작아지면 헤더를 위아래로 배치 */
        @media (max-width: 600px) { header { flex-direction: column; text-align: center; } }
    </style>
</head>
